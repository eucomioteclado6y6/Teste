<!DOCTYPE html>
<html>
<head>
<title>Site Funcionando</title>
<style>
body {
  background-color: #f0f0f0; /* Cor de fundo clara */
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh; /* Ocupa toda a altura da tela */
  margin: 0;
  position: relative; /* Necessário para o conteúdo principal */
}

.background-text {
  font-size: 10vw; /* Tamanho responsivo */
  color: rgba(0, 0, 0, 0.1); /* Cor semi-transparente */
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: -1; /* Coloca o texto atrás de qualquer outro conteúdo */
  white-space: nowrap; /* Mantém o texto em uma única linha */
  text-align: center;
}
</style>
</head>
<body>

<div class="background-text">
  Site funcionando
</div>

<!-- Você pode adicionar o conteúdo principal do seu site aqui -->
<!-- <h1>Bem-vindo ao meu site!</h1> -->

</body>
</html>
