<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Imagens ID</title>
    <style>
        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .resultado { display: flex; gap: 20px; }
        .img-box { width: 350px; height: 220px; border: 2px dashed #999; display: flex; align-items: center; justify-content: center; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div class="container">
    <input type="text" id="nomeUser" placeholder="Nome no documento">
    <button onclick="gerarImagens()">Gerar Identidades</button>

    <div class="resultado">
        <div class="img-box"><img id="previewFrente" src="" alt="Frente"></div>
        <div class="img-box"><img id="previewVerso" src="" alt="Verso"></div>
    </div>
</div>

<!-- Canvas oculto para desenhar as imagens -->
<canvas id="hiddenCanvas" width="700" height="440" style="display:none;"></canvas>

<script>
    function gerarImagens() {
        const nome = document.getElementById('nomeUser').value;
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');

        // FUNÇÃO PARA FRENTE
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, 700, 440);
        ctx.fillStyle = "black";
        ctx.font = "50px Arial";
        ctx.fillText("FRENTE: " + nome, 50, 200);
        document.getElementById('previewFrente').src = canvas.toDataURL("image/png");

        // FUNÇÃO PARA VERSO
        ctx.fillStyle = "#d3d3d3";
        ctx.fillRect(0, 0, 700, 440);
        ctx.fillStyle = "black";
        ctx.fillText("VERSO - DADOS:", 50, 100);
        document.getElementById('previewVerso').src = canvas.toDataURL("image/png");
    }
</script>

</body>
</html>
