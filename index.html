<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Identidade Instantâneo</title>
    <style>
        .tela { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .caixas { display: flex; gap: 20px; }
        .img-resultado { width: 400px; height: 260px; border: 2px solid #333; background: #ddd; }
    </style>
</head>
<body>

<div class="tela">
    <input type="text" id="nomeInput" placeholder="Digite o nome...">
    <button onclick="gerarFoto()">GERAR IDENTIDADE</button>
    
    <div class="caixas">
        <img id="frenteFinal" class="img-resultado" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Frente">
        <img id="versoFinal" class="img-resultado" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Verso">
    </div>
</div>

<script>
    function gerarFoto() {
        const nome = document.getElementById('nomeInput').value;
        
        // Criar o canvas dinamicamente para gerar a imagem
        const canvas = document.createElement('canvas');
        canvas.width = 800;
        canvas.height = 520;
        const ctx = canvas.getContext('2d');

        // DESENHAR FRENTE
        ctx.fillStyle = "#ffffff"; 
        ctx.fillRect(0, 0, 800, 520); // Fundo da frente
        ctx.fillStyle = "#000000";
        ctx.font = "40px Arial";
        ctx.fillText("NOME: " + nome.toUpperCase(), 50, 100);
        ctx.fillText("RG: 12.345.678-X", 50, 160);
        // Aqui você pode adicionar um comando de imagem se tiver o arquivo:
        // ctx.drawImage(minhaFoto, 50, 200, 150, 200); 
        
        document.getElementById('frenteFinal').src = canvas.toDataURL("image/png");

        // DESENHAR VERSO
        ctx.fillStyle = "#f0f0f0";
        ctx.fillRect(0, 0, 800, 520); // Fundo do verso
        ctx.fillStyle = "#333333";
        ctx.fillText("DADOS DO VERSO", 50, 100);
        ctx.fillRect(50, 150, 700, 10); // Linha decorativa
        
        document.getElementById('versoFinal').src = canvas.toDataURL("image/png");
    }
</script>

</body>
</html>
